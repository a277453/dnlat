version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: dn-postgres
    environment:
      POSTGRES_USER: dn_user
      POSTGRES_PASSWORD: dn_pass
      POSTGRES_DB: dn_logs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dn_user -d dn_logs"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: dn-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  backend:
    build: .
    container_name: dn-backend
    command: sh -c "python admin_setup.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dn_logs
      DB_USER: dn_user
      DB_PASSWORD: dn_pass
      Admin_DB_USER: postgres
      Admin_DB_PASSWORD: postgres
      Admin_DB_PORT: 5432
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: dnadmin
      ADMIN_NAME: Admin User
      ADMIN_EMPLOYEE_CODE: ADM0001
      ADMIN_ROLE: ADMIN
      ADMIN_IS_ACTIVE: "True"
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
    ports:
      - "8000:8000"
    volumes:
      - ./app/auth/users.json:/app/auth/users.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  react:
    build: ./react
    container_name: dn-react
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
  # streamlit:
  #   build: .
  #   container_name: dn-streamlit
  #   command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: "5432"
