# ============================================================
# nginx.conf — DN Diagnostics Platform (10-user deployment)
# ============================================================

# Worker tuning — one process, 1024 connections handles 10
# concurrent users with large file uploads easily.
worker_processes      1;
worker_rlimit_nofile  4096;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript;

    # ── Upload size — 500 MB per user ─────────────────────
    client_max_body_size 500M;

    # ── Per-IP rate limiting for API (not uploads) ────────
    # 30 requests/second per user — generous for normal use,
    # prevents runaway polling from broken clients.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        # ── React SPA ─────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API proxy → FastAPI backend ───────────────────
        location /api/ {
            # Apply rate limit with burst of 60 (handles rapid
            # sequential requests from a single user tab)
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long timeouts for ZIP processing and LLM chat
            proxy_read_timeout    600s;
            proxy_connect_timeout  30s;
            proxy_send_timeout    600s;

            # Large request buffering for chunked uploads
            # Each chunk is ≤ 5 MB; we buffer 2 chunks at once.
            proxy_request_buffering   off;
            proxy_buffering           off;
            client_body_buffer_size   10M;

            # SSE / streaming responses — disable buffering so
            # the chat panel receives tokens in real time.
            proxy_cache off;
        }

        # ── Health check (no rate limit) ──────────────────
        location /health {
            proxy_pass http://backend:8000/health;
        }

        # ── Security headers ──────────────────────────────
        add_header X-Frame-Options         "SAMEORIGIN"   always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    }
}
